flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21

  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
  # Edge-to-edge circle → inset 16 overshoots the 66dp safe zone (~73dp).
  # 20% ≈ logo ≤ 66dp of 108dp (Android Adaptive Icon guideline).
  adaptive_icon_foreground_inset: 24

  remove_alpha_ios: true
  background_color_ios: "#0D1B2A"

  web:
    generate: true
    image_path: assets/icon/app_icon_web.png
    theme_color: "#0D1B2A"

  windows:
    generate: false
    image_path: assets/icon/app_icon.png
    icon_size: 256

  macos:
    generate: false
    image_path: assets/icon/app_icon.png
