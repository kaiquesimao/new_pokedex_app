# CI on every PR/push; web deploy to Cloudflare Pages (master + PR previews).
name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Empty secret → default project name (expression treats missing secret as '').
  PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PROJECT_NAME || 'pokedata' }}
  PRODUCTION_URL: https://pokedata.kaique.site

jobs:
  ci:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  deploy-web:
    name: Deploy web (production)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pokedata.kaique.site
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Require deploy secrets
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for name in DART_DEFINES_JSON CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write dart_defines.json
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
        run: printf '%s\n' "$DART_DEFINES_JSON" > dart_defines.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (Wasm + JS fallback)
        run: >-
          flutter build web --release --wasm
          --dart-define-from-file=dart_defines.json

      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build-production-${{ github.sha }}
          path: build/web
          retention-days: 7

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Uses wrangler.toml (pages_build_output_dir).
          command: pages deploy --project-name=${{ env.PAGES_PROJECT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke check (Pages deployment URL)
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::No deployment-url from wrangler-action"
            exit 1
          fi
          echo "Checking $URL"
          curl -fsS --retry 8 --retry-delay 5 --retry-all-errors -o /dev/null "$URL"

      - name: Smoke check (custom domain)
        run: |
          echo "Checking $PRODUCTION_URL"
          # Bot Fight / WAF can 403 GitHub Actions IPs; do not fail the job.
          CODE=$(curl -sS -o /tmp/prod-home.html -w "%{http_code}" \
            --retry 5 --retry-delay 3 --retry-all-errors \
            -A "Mozilla/5.0 (compatible; PokeData-CI/1.0)" \
            "$PRODUCTION_URL/" || echo "000")
          if [ "$CODE" = "403" ] || [ "$CODE" = "000" ]; then
            echo "::warning::Custom domain returned HTTP $CODE (likely Bot Fight). Pages URL smoke already passed."
            exit 0
          fi
          if [ "$CODE" != "200" ]; then
            echo "::error::Custom domain returned HTTP $CODE"
            exit 1
          fi

  deploy-preview:
    name: Deploy web (PR preview)
    needs: ci
    # Same-repo PRs only — fork PRs do not get repository secrets.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Require deploy secrets
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for name in DART_DEFINES_JSON CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write dart_defines.json
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
        run: printf '%s\n' "$DART_DEFINES_JSON" > dart_defines.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (Wasm + JS fallback)
        run: >-
          flutter build web --release --wasm
          --dart-define-from-file=dart_defines.json

      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build-pr-${{ github.event.pull_request.number }}
          path: build/web
          retention-days: 7

      - name: Deploy PR preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy
            --project-name=${{ env.PAGES_PROJECT }}
            --branch=pr-${{ github.event.pull_request.number }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke check (preview URL)
        env:
          URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::No deployment-url from wrangler-action"
            exit 1
          fi
          echo "Checking $URL"
          curl -fsS --retry 8 --retry-delay 5 --retry-all-errors -o /dev/null "$URL"

      - name: Comment preview URL on PR
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body="### Preview deploy"$'\n'
          body+="- Deployment: ${DEPLOYMENT_URL}"$'\n'
          if [ -n "$ALIAS_URL" ]; then
            body+="- Branch alias: ${ALIAS_URL}"$'\n'
          fi
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
