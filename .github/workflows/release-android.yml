# Build signed AAB and upload to Play Store (internal testing by default).
# Trigger: tag v* or Actions → Release Android → Run workflow.
name: Release Android
run-name: Release Android (${{ inputs.track || 'internal' }}) · ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: Play Store track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
      upload:
        description: Upload AAB to Play Store after build
        required: true
        default: true
        type: boolean

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Analyze, build AAB, upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Require release secrets
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          EVENT_NAME: ${{ github.event_name }}
          DO_UPLOAD: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.upload) }}
        run: |
          missing=0
          for name in DART_DEFINES_JSON GOOGLE_SERVICES_JSON KEYSTORE_BASE64 \
            KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret $name"
              missing=1
            fi
          done
          if [ "$DO_UPLOAD" = "true" ] && [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing secret PLAY_SERVICE_ACCOUNT_JSON (required when uploading)"
            missing=1
          fi
          exit "$missing"

      - name: Write dart_defines.json
        env:
          DART_DEFINES_JSON: ${{ secrets.DART_DEFINES_JSON }}
        run: printf '%s\n' "$DART_DEFINES_JSON" > dart_defines.json

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s\n' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=../upload-keystore.jks"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build app bundle
        run: >-
          flutter build appbundle --release
          --dart-define-from-file=dart_defines.json

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Store
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.upload)
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kaiquesimao.pokedex
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: ${{ inputs.track || 'internal' }}
          status: completed
          releaseName: ${{ github.ref_name }}
