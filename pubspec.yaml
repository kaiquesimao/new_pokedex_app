name: pokedex_app
description: "Pokédex Flutter app based on Figma Community design."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  dio: ^5.8.0+1
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  go_router: ^15.1.2
  shared_preferences: ^2.5.3
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_analytics: ^11.4.5
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/elements/
    - assets/images/components/
    - assets/images/characters/
