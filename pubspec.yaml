name: pokedex_app
description: "Pokédex Flutter app based on Figma Community design."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  dio: ^5.8.0+1
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  go_router: ^17.3.0
  shared_preferences: ^2.5.3
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_analytics: ^12.4.2
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  sign_in_with_apple: ^8.1.0
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash/
    - assets/images/elements/
    - assets/images/components/
    - assets/images/characters/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
