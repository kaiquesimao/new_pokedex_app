name: pokedex_app
description: "PokeData - Pokedéx para fãs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.6.0
  connectivity_plus: ^7.2.0
  dio: ^5.10.0
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  firebase_analytics: ^12.4.3
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_riverpod: ^3.3.2
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  package_info_plus: ^10.2.0
  path_provider: ^2.1.6
  riverpod: ^3.3.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash/
    - assets/images/elements/
    - assets/images/components/
    - assets/images/characters/
    - assets/images/regions/
    - assets/legal/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
